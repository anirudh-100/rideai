name: rideai

services:
  postgres:
    image: postgres:15-alpine
    container_name: rideai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rideai
      POSTGRES_USER: rideai
      POSTGRES_PASSWORD: rideai
    ports:
      - "5432:5432"
    volumes:
      - rideai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rideai -d rideai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rideai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - rideai-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rideai-postgres-data:
  rideai-redis-data:
